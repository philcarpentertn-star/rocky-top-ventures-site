<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocky Top Ventures Main Page</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <div class="hero-canvas">
  <div class="overlay">
    
    <header>
      <h1 class="main-title">THANK YOU FOR YOUR ORDER!</h1>
      <p class="sub-title">We'd love to see your new Vols gear in action!</p>
    </header>

    <div class="social-section">
      <p class="share-text">Spread the word to the Vol Nation:</p>
      <div class="button-stack">
        <a href="https://www.facebook.com/sharer/sharer.php?u=https://www.rockytopventures.com/" target="_blank" class="btn-vols">Share on Facebook</a>
        <a href="https://twitter.com/intent/tweet?text=Just%20got%20some%20awesome%20custom%20gear%20from%20Rocky%20Top%20Ventures!&url=https://www.rockytopventures.com/" target="_blank" class="btn-vols">Share on X</a>
      </div>
    </div>

    <div class="review-callout">
      <h2>HAPPY WITH YOUR GEAR?</h2>
      <p>Your 5-star reviews help our small business grow!</p>
      <a href="https://www.etsy.com/your/purchases" target="_blank" class="btn-review">Leave a Review on Etsy</a>
    </div>

    <footer class="shop-footer">
      <a href="https://rockytopventures.etsy.com" target="_blank" class="btn-main-shop">BACK TO ETSY SHOP</a>
      <div class="game-time-box">IT'S GAME TIME! 🍊</div>
    </footer>
    
  </div>
</div>

</html>
